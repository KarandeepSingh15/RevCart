server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/products/**
              
        - id: inventory-service
          uri: http://localhost:8084
          predicates:
            - Path=/inventory/**
jwt:
  secret: ${JWT_SECRET}



