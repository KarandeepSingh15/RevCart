<h2 mat-dialog-title>{{ title }}</h2>

<mat-dialog-content style="min-width: 420px">
  <form [formGroup]="form" class="flex-col" style="padding-top: 8px">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Product Name</mat-label>
      <input matInput formControlName="name" placeholder="e.g. Brake Pads Set">
      <mat-error *ngIf="form.get('name')?.hasError('required')">Name is required</mat-error>
      <mat-error *ngIf="form.get('name')?.hasError('minlength')">At least 2 characters</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3"
        placeholder="Brief product description..."></textarea>
    </mat-form-field>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px">
      <mat-form-field appearance="outline">
        <mat-label>Price (₹)</mat-label>
        <input matInput type="number" formControlName="price" min="0.01" step="0.01">
        <mat-icon matPrefix>currency_rupee</mat-icon>
        <mat-error *ngIf="form.get('price')?.hasError('required')">Price is required</mat-error>
        <mat-error *ngIf="form.get('price')?.hasError('min')">Must be positive</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Category</mat-label>
        <mat-select formControlName="category">
          <mat-option *ngFor="let cat of categories" [value]="cat">
            {{ getCategoryLabel(cat) }}
          </mat-option>
        </mat-select>
        <mat-error>Category is required</mat-error>
      </mat-form-field>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="loading || form.invalid">
    <mat-spinner diameter="16" *ngIf="loading" style="display:inline-block; margin-right:6px"></mat-spinner>
    {{ loading ? 'Saving...' : (data.mode === 'create' ? 'Create' : 'Update') }}
  </button>
</mat-dialog-actions>
