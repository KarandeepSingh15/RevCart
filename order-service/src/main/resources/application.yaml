server:
  port: 8083
spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5434/order_db
    username: admin
    password: admin

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  cloud:
    openfeign:
      client:
        config:
          product-service:
            connectTimeout: 2000
            readTimeout: 5000

  kafka:
    bootstrap-servers: localhost:9092,localhost:9093,localhost:9094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.revcart.common_events.events.SagaMessage

product:
  service:
    url: http://localhost:8082

resilience4j:
  retry:
    retryAspectOrder: 2
    instances:
      product-service:
        max-attempts: 3
        wait-duration: 2s
        ignore-exceptions:
          - com.revcart.order_service.exception.ValidationException
          - com.revcart.order_service.exception.ProductNotAvailableException
  circuitbreaker:
    circuitBreakerAspectOrder: 1
    instances:
      product-service:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        ignore-exceptions:
          - com.revcart.order_service.exception.ValidationException
          - com.revcart.order_service.exception.ProductNotAvailableException

