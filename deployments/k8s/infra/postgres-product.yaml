apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-product
  namespace: revcart
spec:
  serviceName: postgres-product-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgres-product
  template:
    metadata:
      labels:
        app: postgres-product
    spec:
      containers:
        - name: postgres-product
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "product_db"
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: revcart-config
                  key: db-username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: revcart-secrets
                  key: db-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-product-headless
  namespace: revcart
spec:
  clusterIP: None
  selector:
    app: postgres-product
  ports:
    - port: 5432
      targetPort: 5432
