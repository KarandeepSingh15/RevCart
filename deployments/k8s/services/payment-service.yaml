apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: revcart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: karandeepsingh15/revcart.payment-service:0.0.1-SNAPSHOT
          ports:
            - containerPort: 8085
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: revcart-config
                  key: payment-db-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: revcart-config
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: revcart-secrets
                  key: db-password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: revcart-config
                  key: kafka-bootstrap-servers
            - name: USER_TIMEZONE
              valueFrom:
                configMapKeyRef:
                  name: revcart-config
                  key: user-timezone
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: revcart
spec:
  selector:
    app: payment-service
  type: ClusterIP
  ports:
    - port: 8085
      targetPort: 8085
