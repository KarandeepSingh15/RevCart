apiVersion: apps/v1
kind: Deployment
metadata:
  name: revcart-ui
  namespace: revcart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: revcart-ui
  template:
    metadata:
      labels:
        app: revcart-ui
    spec:
      containers:
        - name: revcart-ui
          image: karandeepsingh15/revcart.ui:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: revcart-ui
  namespace: revcart
spec:
  selector:
    app: revcart-ui
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
