apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: revcart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: karandeepsingh15/revcart.order-service:0.0.1-SNAPSHOT
          ports:
            - containerPort: 8083
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: revcart-config
                  key: order-db-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: revcart-config
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: revcart-secrets
                  key: db-password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: revcart-config
                  key: kafka-bootstrap-servers
            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: revcart-config
                  key: product-service-url
            - name: USER_TIMEZONE
              valueFrom:
                configMapKeyRef:
                  name: revcart-config
                  key: user-timezone
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: revcart
spec:
  selector:
    app: order-service
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: 8083
