apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: revcart-ingress
  namespace: revcart
  annotations:
    # Rewrite rules — strip the matched prefix before forwarding to the gateway.
    # The gateway itself handles routing to downstream services, so we pass
    # the path through as-is (no rewrite needed).
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: revcart.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
